<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .border { fill: #e5e5e5; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f0f0f; }
      .border { fill: #1e1e1e; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Three squares matching the status bar logo -->
  <!-- Square 1: full opacity -->
  <rect x="22" y="70" width="42" height="42" rx="7" fill="#3ecf6e" />
  <!-- Square 2: 60% opacity -->
  <rect x="70" y="70" width="42" height="42" rx="7" fill="#3ecf6e" opacity="0.6" />
  <!-- Square 3: 30% opacity -->
  <rect x="118" y="70" width="42" height="42" rx="7" fill="#3ecf6e" opacity="0.3" />
</svg>
